services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: koq_stock_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: KoqStockManagement.Api/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=koq_stock_db;Username=postgres;Password=postgrespassword
    ports:
      - "5050:8080"
    depends_on:
      - db

volumes:
  pgdata:
